bundle:
  name: gift_india

variables:
  lakebase_branch:
    description: Lakebase branch resource name
    default: projects/gift-india/branches/production
  lakebase_database:
    description: Lakebase database resource name (Postgres db name is gift_india)
    default: projects/gift-india/branches/production/databases/gift-india

sync:
  exclude:
    - .venv/**
    - data/**
    - prompts/**
    - docs/**
    - db/**
    - gift_india/**
    - docker-compose.yml
    - "**/__pycache__/**"
    - "*.md"

resources:
  apps:
    gift_india:
      name: gift-india
      description: "gift_india — surgical-team placement copilot on live Lakebase data"
      source_code_path: .
      resources:
        - name: postgres
          postgres:
            branch: ${var.lakebase_branch}
            database: ${var.lakebase_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-0be3157e-0574.cloud.databricks.com
