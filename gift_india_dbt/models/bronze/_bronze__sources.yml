version: 2

sources:
  - name: bronze
    description: >-
      Raw landing tables for Governance, Integrity, & Facility Trust (GIFT) Desk. The Python loader
      (`gift_india_api/src/load_db.py`) writes the governed / synthetic facility
      and district records here verbatim; dbt promotes them through silver and
      gold. Defaults to the `bronze` schema where the loader writes (override
      with `--vars '{bronze_schema: <schema>}'`).
    schema: "{{ var('bronze_schema', 'bronze') }}"
    tables:
      - name: facilities
        description: >-
          Geotagged healthcare facility records (entity-resolved upstream, with a
          `match_confidence` score). One row per facility.
        columns:
          - name: facility_id
            description: Stable facility primary key (e.g. `VF-000123`).
            tests:
              - not_null
              - unique
          - name: lat
            description: Facility latitude (WGS84).
            tests:
              - not_null
          - name: lon
            description: Facility longitude (WGS84).
            tests:
              - not_null
          - name: state
            tests:
              - not_null
          - name: district
            tests:
              - not_null
          - name: match_confidence
            description: Named-entity-resolution confidence score (0-1).

      - name: districts
        description: >-
          District reference (centroid lat/lon, population, urbanity) plus
          NFHS-5 district health indicators. One row per (district, state).
        columns:
          - name: district
            tests:
              - not_null
          - name: state
            tests:
              - not_null
          - name: lat
            tests:
              - not_null
          - name: lon
            tests:
              - not_null
          - name: population
            description: District population (persons).

      - name: facility_web_crawl
        description: >-
          Raw crawl payloads from each facility's official website
          (`gift_india_api/src/scraper.py`), landed by `src/load_crawl.py`. One
          row per crawl attempt (append-only, idempotent on `crawl_id`); failed
          attempts are kept too (NULL `raw_*`) to preserve provenance. `raw_text`
          is the replayable input to the silver extraction step.
        columns:
          - name: crawl_id
            description: sha256(website_url + crawled_at) — stable per attempt.
            tests:
              - not_null
              - unique
          - name: website_url
            description: The facility website URL that was requested.
            tests:
              - not_null
          - name: crawled_at
            description: When the crawl attempt ran (UTC).
            tests:
              - not_null
          - name: status
            description: Crawl outcome — `ok`, `http_error`, or `fetch_error`.
            tests:
              - not_null

      - name: jci_accreditations
        description: >-
          JCI (Joint Commission International) accredited organizations in India,
          compiled by `gift_india_api/src/jci_scraper.py` from curated medical-
          tourism aggregator lists (a sample spot-checked against the official JCI
          directory, which blocks bulk export) and landed by `src/load_jci.py`. An
          external accreditation REFERENCE source (`data_source` = 'jci'), NOT a
          facility record — resolved to facility_ids downstream (silver -> gold
          crosswalk) on the normalized name. Idempotent on `jci_org_id`.
        columns:
          - name: jci_org_id
            description: sha256(match_name + city + state)[:16] — stable per org.
            tests:
              - not_null
              - unique
          - name: jci_name
            description: Organization name as published by the source.
            tests:
              - not_null
          - name: match_name
            description: Normalized name (entity-resolution key).
            tests:
              - not_null
          - name: website_url
            description: >-
              Official hospital homepage — the scrape target. `src.jci_scraper
              --scrape-pages` snapshots it under
              data/jci/scraped/<state>/<district>/<name>-<id>/.
          - name: snapshot_dir
            description: Relative path to the scraped homepage snapshot (or null).
          - name: data_source
            description: Provenance tag — always `jci`.
            tests:
              - not_null
