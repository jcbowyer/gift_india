version: 2

models:
  - name: silver_geography
    description: >-
      Cleaned, typed, conformed district records (one row per district within a
      state) with `state_code` attached and coordinates validated. The geography
      grain for the medallion.
    columns:
      - name: district
        tests: [not_null]
      - name: state
        tests: [not_null]
      - name: state_code
        description: 2-letter state / UT code joined from the state_codes seed.
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]
      - name: population
        description: District population (persons).

  - name: silver_facilities
    description: >-
      Cleaned, typed, conformed facility records with `state_code` attached,
      coordinates validated, and duplicate `facility_id`s resolved to the highest
      `match_confidence`.
    columns:
      - name: facility_id
        tests:
          - not_null
          - unique
      - name: name
        tests: [not_null]
      - name: type
        tests: [not_null]
      - name: district
        tests: [not_null]
      - name: state
        tests: [not_null]
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]
      - name: offers_surgery
        tests: [not_null]
      - name: match_confidence
        description: Named-entity-resolution confidence score (0-1).

  - name: silver_facility_web_crawl
    description: >-
      Cleaned, typed, deduped facility website crawls — one row per facility (or
      per URL when unlinked), keeping the most recent successful crawl and
      falling back to the latest attempt when a URL only ever failed. Derives a
      primary contact email/phone from the boilerplate-stripped `raw_text`.
    columns:
      - name: crawl_id
        description: sha256(website_url + crawled_at) of the kept crawl.
        tests:
          - not_null
          - unique
      - name: crawl_key
        description: Grain key — facility_id, or the resolved URL when unlinked.
        tests:
          - not_null
          - unique
      - name: website_url
        tests: [not_null]
      - name: crawled_at
        tests: [not_null]
      - name: crawl_ok
        description: True when the kept crawl succeeded (status = 'ok').
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['ok', 'http_error', 'fetch_error']
