version: 2

models:
  - name: geography
    description: >-
      Gold serving dimension of places (one row per district within a state),
      keyed by `geography_id`, carrying centroid lat/lon, NFHS-5 indicators, and
      rolled-up facility counts. gold.facilities links to this table.
    config:
      contract:
        enforced: true
    columns:
      - name: geography_id
        description: "Surrogate key: `<state_code>-<district-slug>` (e.g. `mh-mumbai`)."
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: district
        data_type: text
        constraints: [{type: not_null}]
      - name: state
        data_type: text
        constraints: [{type: not_null}]
      - name: state_code
        description: 2-letter state / UT code.
        data_type: text
      - name: lat
        description: District centroid latitude (WGS84).
        data_type: double precision
        constraints: [{type: not_null}]
      - name: lon
        description: District centroid longitude (WGS84).
        data_type: double precision
        constraints: [{type: not_null}]
      - name: population
        description: District population (persons).
        data_type: integer
      - name: urbanity
        description: Urbanity index (0-1).
        data_type: double precision
      - name: fp_unmet_pct
        data_type: double precision
      - name: institutional_birth_pct
        data_type: double precision
      - name: csection_pct
        data_type: double precision
      - name: anaemia_pct
        data_type: double precision
      - name: facility_count
        description: Facilities located in this geography.
        data_type: integer
      - name: surgical_facility_count
        description: Facilities in this geography that offer surgery.
        data_type: integer
      - name: annual_surgeries_total
        description: Sum of annual surgeries across facilities in this geography.
        data_type: integer

  - name: facilities
    description: >-
      Gold serving table of geotagged healthcare facilities. Linked to
      gold.geography by `geography_id` and to its district centroid by lat/lon
      via `distance_from_centroid_km` (great-circle km).
    config:
      contract:
        enforced: true
    columns:
      - name: facility_id
        description: Stable facility primary key (e.g. `VF-000123`).
        data_type: text
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: name
        data_type: text
        constraints: [{type: not_null}]
      - name: type
        data_type: text
        constraints: [{type: not_null}]
      - name: geography_id
        description: FK to gold.geography.geography_id.
        data_type: text
        constraints:
          - type: foreign_key
            expression: "gold.geography (geography_id)"
        tests:
          - relationships:
              arguments:
                to: ref('geography')
                field: geography_id
      - name: district
        data_type: text
        constraints: [{type: not_null}]
      - name: state
        data_type: text
        constraints: [{type: not_null}]
      - name: state_code
        data_type: text
      - name: lat
        description: Facility latitude (WGS84).
        data_type: double precision
        constraints: [{type: not_null}]
      - name: lon
        description: Facility longitude (WGS84).
        data_type: double precision
        constraints: [{type: not_null}]
      - name: beds
        data_type: integer
      - name: annual_surgeries
        data_type: integer
      - name: offers_surgery
        data_type: boolean
        constraints: [{type: not_null}]
      - name: specialties
        description: Pipe-delimited list of surgical specialties offered.
        data_type: text
      - name: website_url
        description: Canonical facility website URL (null when unknown).
        data_type: text
      - name: match_confidence
        description: Named-entity-resolution confidence score (0-1).
        data_type: double precision
      - name: distance_from_centroid_km
        description: Great-circle km from the facility to its geography centroid.
        data_type: numeric
      - name: jci_accredited
        description: >-
          True when this facility entity-resolves (confidence >= 0.70) to a
          JCI-accredited organization in gold.facility_jci.
        data_type: boolean
        constraints: [{type: not_null}]
      - name: jci_organization_name
        description: Resolved JCI organization name (null when not accredited).
        data_type: text
      - name: jci_match_method
        description: "Entity-resolution tier: exact_name_state | brand_city | brand_state."
        data_type: text
      - name: jci_match_confidence
        description: Confidence (0-1) of the JCI entity-resolution match.
        data_type: numeric
      - name: jci_source
        description: Aggregator/source the JCI accreditation row came from.
        data_type: text
      - name: jci_data_source
        description: Provenance tag of the accreditation signal ('jci').
        data_type: text
      - name: nabh_accredited
        description: >-
          True when this facility entity-resolves (confidence >= 0.70) to a NABH
          accredited / certified / empanelled organization in gold.facility_nabh.
        data_type: boolean
        constraints: [{type: not_null}]
      - name: nabh_organization_name
        description: Resolved NABH organization name (null when not matched).
        data_type: text
      - name: nabh_accreditation_status
        description: "Resolved NABH status: Accredited | Certified | Empaneled (null when not matched)."
        data_type: text
      - name: nabh_accreditation_program
        description: "Resolved NABH programme (e.g. Hospitals, SHCO, AYUSH Hospitals)."
        data_type: text
      - name: nabh_match_method
        description: "Entity-resolution tier: exact_name_state | brand_city | brand_state."
        data_type: text
      - name: nabh_match_confidence
        description: Confidence (0-1) of the NABH entity-resolution match.
        data_type: numeric
      - name: nabh_source
        description: Source the NABH accreditation row came from ('nabh_directory').
        data_type: text
      - name: nabh_data_source
        description: Provenance tag of the accreditation signal ('nabh').
        data_type: text

  - name: facility_jci
    description: >-
      Entity-resolution crosswalk: governed facilities resolved (inner join on
      normalized name / brand key + state) to JCI-accredited organizations. One
      row per matched facility_id, carrying the match tier + confidence and the
      JCI provenance. gold.facilities reads this to flag `jci_accredited`.
    columns:
      - name: facility_id
        description: Resolved facility primary key.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('facilities')
                field: facility_id
      - name: jci_org_id
        tests: [not_null]
      - name: jci_organization_name
        tests: [not_null]
      - name: match_method
        tests:
          - not_null
          - accepted_values:
              values: ['exact_name_state', 'brand_city', 'brand_state']
      - name: match_confidence
        tests: [not_null]
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              values: ['jci']

  - name: facility_nabh
    description: >-
      Entity-resolution crosswalk: governed facilities resolved (inner join on
      normalized name / brand key + state) to NABH accredited / certified /
      empanelled organizations. One row per matched facility_id, carrying the match
      tier + confidence, the NABH status/programme/reference, and provenance.
      gold.facilities reads this to flag `nabh_accredited`.
    columns:
      - name: facility_id
        description: Resolved facility primary key.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('facilities')
                field: facility_id
      - name: nabh_org_id
        tests: [not_null]
      - name: nabh_organization_name
        tests: [not_null]
      - name: accreditation_status
        tests:
          - accepted_values:
              values: ['Accredited', 'Certified', 'Empaneled']
              config:
                severity: warn
      - name: match_method
        tests:
          - not_null
          - accepted_values:
              values: ['exact_name_state', 'brand_city', 'brand_state']
      - name: match_confidence
        tests: [not_null]
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              values: ['nabh']

  - name: facility_capability_assessments
    description: >-
      Track 1 serving table: one row per (facility, capability) with a trust
      signal derived from structured gold.facilities fields only.
    columns:
      - name: facility_id
        tests:
          - not_null
      - name: capability
        tests:
          - not_null

  - name: capability_evidence
    description: >-
      Citations backing facility capability assessments. Snippets are built from
      real facility-record column values and real crawled website text (a quoted
      window from silver_facility_web_crawl) — never fabricated prose.
    columns:
      - name: evidence_id
        tests:
          - unique
          - not_null
      - name: facility_id
        tests:
          - not_null
      - name: capability
        tests:
          - not_null

  - name: capability_scored
    description: >-
      Deterministic evidence_strength_score per (facility, capability) plus a
      shared evidence_context block for Agent Bricks narration. Ranking uses
      this score; LLM output in capability_evidence_json/md only narrates it.
    columns:
      - name: facility_id
        tests:
          - not_null
      - name: capability
        tests:
          - not_null
      - name: evidence_strength_score
        tests:
          - not_null
      - name: evidence_tier
        tests:
          - not_null
          - accepted_values:
              values: ['Strong', 'Moderate', 'Weak', 'Insufficient']
