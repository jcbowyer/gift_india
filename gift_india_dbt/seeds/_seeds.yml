version: 2

seeds:
  - name: state_codes
    description: >-
      Lookup of Indian state / union-territory full name to its 2-letter code
      (`state_code`). Used by the silver layer to attach `state_code` alongside
      the full `state` name, per the platform naming rule.
    columns:
      - name: state
        description: Full state / UT name (matches the source `state` text).
        tests:
          - not_null
          - unique
      - name: state_code
        description: 2-letter state / UT code.
        tests:
          - not_null
          - unique

  - name: capabilities
    description: >-
      Track 1 capability catalog (ICU, maternity, emergency, oncology, trauma,
      NICU). Cross-joined with gold.facilities to build trust assessments.
    columns:
      - name: capability
        tests:
          - not_null
          - unique
      - name: label
        tests:
          - not_null
      - name: description
        tests:
          - not_null

  - name: state_aliases
    description: >-
      Normalised spellings / city labels in Virtue scraped data mapped to canonical
      Survey-of-India state names. Join on `geo_norm(raw_label) = raw_norm`.
    columns:
      - name: raw_norm
        tests:
          - not_null
          - unique
      - name: state
        description: Canonical state / UT name (matches state_codes.state).
        tests:
          - not_null
