pe="application/json">{"props":{"pageProps":{"name":"dranandkulkarni","doctorId":"d9fe3ade-fe58-47ed-ace6-d1aee3fda6da","specialityGroupId":"a2c873a0-9042-4ddc-bdd3-69a61a254936","speciality":"95f5ef11-1b85-472e-876c-07a77919e513","chatBotDoctorIds":["aa984c62-cb1a-47bd-85e3-e6a2a3d7c45d"],"dehydratedState":{"mutations":[],"queries":[{"state":{"data":[{"userName":"d9fe3ade-fe58-47ed-ace6-d1aee3fda6da","name":{"firstName":"Anand Kulkarni","name":"Anand Kulkarni"},"gender":"male","address":{"addressLine1":"Not_provided","city":"Thane","state":"Maharashtra","country":"India","zip":410210},"imageUrl":"https://remedoapp.com/arogya/v1.0/images/doctors/ycavjwvayuophiigeqxkwztonf.jpeg","profile":{"info":{"acquisitionChannel":"STNI","degrees":{"degrees":["MDS"]},"awards":{"awards":[]},"aptBookingNumber":["8454937207"],"googleProfileLink":"https://search.google.com/local/writereview?placeid=ChIJK-lVk6vD5zsRmKgglqh9gjg","experience":"9+ years","chatBotAgentId":"3cf81784-ff11-4066-a055-bfae57f9ab68"},"specialityDetails":{"specialityId":"95f5ef11-1b85-472e-876c-07a77919e513","specialityName":"Prosthodontist \u0026 Implantologist","specialityGroupId":"a2c873a0-9042-4ddc-bdd3-69a61a254936","specialityGroupName":"Dentistry","specialityIdName":"Dental Surgeon"},"trialDaysLeft":0},"doctorCode":"RM07841"}],"dataUpdateCount":1,"dataUpdatedAt":1781563010558,"error":null,"errorUpdateCount":0,"errorUpdatedAt":0,"fetchFailureCount":0,"fetchMeta":null,"isFetching":false,"isInvalidated":false,"isPaused":false,"status":"success"},"queryKey":["getDoctorProfile","d9fe3ade-fe58-47ed-ace6-d1aee3fda6da"],"queryHash":"[\"getDoctorProfile\",\"d9fe3ade-fe58-47ed-ace6-d1aee3fda6da\"]"},{"state":{"data":{"data":[],"meta":{"pagination":{"page":1,"pageSize":8,"pageCount":0,"total":0}}},"dataUpdateCount":1,"dataUpdatedAt":1781563010599,"error":null,"errorUpdateCount":0,"errorUpdatedAt":0,"fetchFailureCount":0,"fetchMeta":null,"isFetching":false,"isInvalidated":false,"isPaused":false,"status":"success"},"queryKey":["facilities",false],"queryHash":"[\"facilities\",false]"},{"state":{"data":{"data":[{"id":53,"attributes":{"id":53,"title":"How To Combat Dental Anxiety?","name":"how-to-combat-dental-anxiety-1","article_type":"healthblog","summary":"For many of us, going to the dentist is a stressful experience. We simply avoid going to the dentist when we have dental anxiety. \n\n","body":"\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eFor many of us, going to the dentist is a stressful experience. We simply avoid going to the dentist when we have \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003edental anxiety.\u0026nbsp;\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eDental examinations\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e are usually recommended once or twice a year. These regular visits help you maintain your \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eoral health \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eand prevent you from developing other dental problems that could worsen over time if left untreated.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eBut what causes\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e dental phobia\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e in the first place? This uneasy feeling could be caused by apprehension about what will happen, a fear of\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e dental pain\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e, or a bad experience in the past. In that case, make an appointment with the \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ebest dental hospital\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e in India, which will be able to assist you in overcoming your dental anxiety. Here are some things you can do as a patient to calm down before your oral examination.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e1. Find the right dentist\u0026nbsp;\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eDental clinics\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e play an important role in treating dental anxiety. The importance of helpful and friendly staff, their behavior with you, and the level of satisfaction with the treatment received are all important. The way a dentist responds to your questions, the clinic's atmosphere, and, most importantly, the treatment quality. All of these things can help you overcome your dental phobia.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e2. Try some calming techniques\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eBefore going to the dentist, most people prefer to \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003estretch, meditate, or practice deep breathing control\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e. These are all techniques that can help you reduce your anxiety and have more pleasant dental visits.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e3. Be on time\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eRushing to your dental appointments can make you \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003etense\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e, adding unnecessary stress to your dental visits. \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eSchedule your day\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e around your dental appointments. Allow yourself enough time to unwind before your dental appointments. Bring a friend or relative with you, as having someone to talk to can help you relax and be calmer during your visits.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e4. Don’t hide anything from your dentist\u0026nbsp;\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eDental anxiety\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e is a common problem that must be addressed promptly. An experienced dentist will do everything possible to alleviate your dental stress and anxiety. Don’t be afraid to ask questions. Your dentists are available to answer any questions you may have about the procedure. Keeping your fears bottled up will only make you feel more anxious.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eIt is not a wise decision to avoid dental visits because you are nervous. A dentist is well-versed in dealing with these problems and will gladly assist you in resolving them. Additionally, scheduling your next dental appointment ahead of time allows you to mentally prepare for your next appointment. we make it a priority to assist patients in overcoming their dental phobias and anxieties. Make an appointment at one of our local clinics today and say goodbye to your dental anxiety!\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp class=\"ql-align-center\"\u003e\u003cbr\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-09T05:13:05.608Z","updatedAt":"2024-11-21T07:22:58.099Z","publishedAt":"2022-04-19T10:08:45.570Z","button_text":nu o@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"},"updatedBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"}}},{"id":40,"attributes":{"id":40,"title":" Ways To Avoid Dental Cavities","name":"ways-to-avoid-dental-cavities-1","article_type":"healthblog","summary":"Although brushing and flossing are two important daily oral hygiene routines for maintaining the health of your teeth and gums, there are a few other simple things you can do to prevent tooth decay.","body":"\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eAre you interested in learning how to avoid cavities? Continue reading for some helpful hints on how to avoid tooth decay.\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eDental cavities are very common. Although oral health is an important aspect of our overall well-being, it is frequently overlooked.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eCAVITIES PREVENTION TIPS\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eAlthough \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ebrushing and flossing \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eare two important daily oral hygiene routines for maintaining the health of your teeth and gums, there are a few other simple things you can do to\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e prevent tooth decay or\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e worse, tooth loss. The following are some suggestions for preventing dental cavities:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e1. Brush on a regular basis the right way\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eBrushing \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eyour teeth reduces the incidence of \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ebacteria and plaque\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e, making it one of the simplest yet most effective ways to prevent cavities. Brush your teeth after every meal and before going to bed. Brushing your teeth at night (especially after a late-night snack) is essential; otherwise, bacteria will remain on your teeth and cause \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eenamel erosion,\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e which will lead to cavities.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eAvoid aggressive horizontal brushing to avoid gum injury. For kids, you can use a soft brush and teach them to brush in a circular motion. Generally, fluoride-containing toothpaste is highly recommended for the best results.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e2. Visit the dentist\u0026nbsp;\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003ePatients can take control of their dental health by first determining their cavity risk. This information can be obtained from a comprehensive \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003edental examination \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eby a dentist. They will be aware of any treatments that may be required, as well as any changes in \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003edental hygiene and nutrition\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e that may be beneficial. Patients can then use a more focused and effective strategy. It is advised to go for a routine dental checkup after every three months.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e3. Lower your sugar consumption\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eBacteria rely on sugar in the mouth to grow and thrive, and humans assist them in this process by making sugars readily available. If you must have a cup of coffee or tea in the morning, try to finish it in under 20 minutes and avoid adding additional cream or sugar. It's also a good idea to rinse your mouth after every meal.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eSugary drinks are bad for your teeth and your health. \u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e4. Flossing is essential\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eRegardless of how effective the brushing technique is, the gaps between the teeth are difficult to reach. Food particles tend to collect more in these small spaces. \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eFlossing \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eis necessary to remove food stuck between the teeth and to clean areas where the brush cannot reach. Avoid snapping your gums by using gentle strokes. One can always go for more upgraded options like interdental brushed and water floss.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e5. Quit smoking\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eSmoking and chewing tobacco \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eare two of the mouth's worst enemies. In addition to staining your teeth, smoking causes \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003etooth decay, gum disease, tooth loss, and oral cancer\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e. It is advisable to reduce the frequency of habit slowly rather than quitting it all at once.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e6. Make use of mouthwash\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eOn the market, there are several brands of \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eantimicrobial dental \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003erinses that have been clinically proven to \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eprevent or reduce plaque.\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e Using these \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003emouthwashes \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eafter meals or brushing your teeth can help prevent cavities.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003e7. Get dental sealants\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eSealants \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eare materials that are applied to the chewing surfaces of the back teeth to protect them. To prevent cavities, the sealant acts as a shield for the tooth against \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eplaque and bacteria accumulation. \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eSealants are most commonly used on children due to the eruption of permanent teeth, but they can also be used on adults.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eBOTTOM LINE\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eNobody expects to have to deal with \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003edental cavities, discomfort, or infection\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e at any point in their lives. To protect your teeth and gums from decay and damage, you should take your\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e oral health\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e seriously. Cavities can be avoided with \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eregular dental checkups, brushing, flossing, and a low-sugar diet.\u003c/em\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T13:04:46.911Z","updatedAt":"2024-11-21T07:23:34.130Z","publishedAt":"2022-04-19T10:52:42.142Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":49,"name":"Ways-to-avoid-dental-cavities.jpg","alternativeText":"Ways-to-avoid-dental-cavities.jpg","caption":"Ways-to-avoid-dental-cavities.jpg","width":1280,"height":720,"formats":{"large":{"ext":".jpg","url":"https://d3t5ai5vcxyqte.cloudfront.net/media/opxonrcudekeywwmy.jpg","hash":"large_Ways_to_avoid_dental_cavities_d18592edc8","mime":"image/jpeg","name":"large_Ways-to-avoid-dental-cavities.jpg","path":null,"size":52.69,"width":1000,"height":563},"small":{"ext":".jpg","url":"https://d3t5ai5vcxyqte.cloudfront.net/media/sdonnnvxfd.jpg","hash":"small_Ways_to_avoid_dental_cavities_d18592edc8","mime":"image/jpeg","name":"small_Ways-to-avoid-dental-cavities.jpg","path":null,"size":16.7,"width":500,"height":281},"medium":{"ext":".jpg","url":"https://d3t5ai5vcxyqte.cloudfront.net/media/srldifzfgdxn.jpg","hash":"medium_Ways_to_avoid_dental_cavities_d18592edc8","mime":"image/jpeg","name":"medium_Ways-to-avoid-dental-cavities.jpg","path":null,"size":32.06,"width":750,"height":422},"thumbnail":{"ext":".jpg","url":"https://d3t5ai5vcxyqte.cloudfront.net/media/gxarpcm.jpg","hash":"thumbnail_Ways_to_avoid_dental_cavities_d18592edc8","mime":"image/jpeg","name":"thumbnail_Ways-to-avoid-dental-cavities.jpg","path":null,"size":5.8,"width":245,"height":138}},"hash":"Ways_to_avoid_dental_cavities_d18592edc8","ext":".jpg","mime":"image/jpeg","size":77.22,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/ucpouzmixiondrdth.jpg","previewUrl":null,"provider":"remedo-upload","provider_metadata":null,"createdAt":"2022-04-07T09:51:07.113Z","updatedAt":"2022-04-07T09:51:07.113Z","folderPath":null},"negated_doctors":[{"id":1657,"doctor_id":"9d08f505-600f-4b58-9116-a154423f8b76","createdAt":"2024-07-04T06:55:10.109Z","updatedAt":"2024-09-10T06:01:15.112Z","publishedAt":"2024-07-04T06:55:10.094Z","name":"Dr. Parijat Pallav"},{"id":845,"doctor_id":"a4664de8-e5c3-46c0-9e23-3597e541a22b","createdAt":"2023-04-14T11:37:07.353Z","updatedAt":"2023-04-14T11:37:10.922Z","publishedAt":"2023-04-14T11:37:10.918Z","name":"dr-shireen"},{"id":654,"doctor_id":"09680f83-d332-455e-ba9d-a6b0192d50b6","createdAt":"2023-02-28T11:43:49.911Z","updatedAt":"2023-02-28T11:43:51.747Z","publishedAt":"2023-02-28T11:43:51.744Z","name":"drnitinkumarmoral"}],"seo_information":{"id":40,"title":"Ways to Avoid Dental Cavities","description":null,"keywords":"dental, cavities, tooth problems"},"faq":[],"negated_specialities":[],"speciality_groups":[{"id":7,"speciality_group_id":"a2c873a0-9042-4ddc-bdd3-69a61a254936","speciality_group_name":"Dentistry","createdAt":"2022-04-05T15:16:10.437Z","updatedAt":"2022-04-05T15:16:10.437Z","publishedAt":"2022-04-05T15:16:10.435Z"}],"executive_tags":[{"id":1,"tag_name":"Free","createdAt":"2022-10-14T07:21:49.257Z","updatedAt":"2022-10-14T07:21:50.115Z","publishedAt":"2022-10-14T07:21:50.110Z"}],"doctors":[],"tags":[{"id":470,"tag":"Gums and flossing","createdAt":"2022-04-08T14:59:14.067Z","updatedAt":"2022-04-08T14:59:14.067Z","publishedAt":"2022-04-08T14:59:14.066Z"},{"id":471,"tag":"Brushing technique","createdAt":"2022-04-08T14:59:14.120Z","updatedAt":"2022-04-08T14:59:14.120Z","publishedAt":"2022-04-08T14:59:14.120Z"},{"id":523,"tag":"tooth extractions","createdAt":"2022-04-08T14:59:17.208Z","updatedAt":"2022-04-08T14:59:17.208Z","publishedAt":"2022-04-08T14:59:17.207Z"}],"createdBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"},"updatedBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"}}},{"id":39,"attributes":{"id":39,"title":"Common Dental Problems: Lets Not Ignore","name":"common-dental-problems-lets-not-ignore-1","article_type":"healthblog","summary":"Tooth problems are nothing less than an emergency no matter how minor or major the problem might be. Dental problems are varied and knowing how to handle them can actually go a long way in preventing long term damage.","body":"\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eTooth problems\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e are nothing less than an emergency no matter how minor or major the problem might be. Dental problems are varied and knowing how to handle them can actually go a long way in preventing long-term damage. \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eRestoring good oral health \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003ewith quick immediate response and the appropriate first aid treatment is the best rescue operation.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eMaintaining dental care and hygiene \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eis the best way to maintain your oral health and knowing what to do if there is a problem is the best knowledge you can receive to help yourself or someone in need.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eLet's discuss a few common problems:\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eToothache\u003c/strong\u003e\u003cspan style=\"background-color: transparent;\"\u003e:\u0026nbsp;\u003c/span\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eTooth pain or tooth sensitivity \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eis an indicator of \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003edental decay\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e and the treatment is dependent on the extent of dental decay. If the dental decay is restricted to the superficial region then there might be no associated pain but sensitivity, however, if the decay has spread deep into the pulp then there are chances of persistent pain and \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eswelling/abscess\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e will be seen around the gums of the affected tooth.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eThoroughly rinse the affected tooth with\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e warm saline rinse\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e and use dental floss to remove any impacted food and visit a dental surgeon at the earliest. Any kind of medicine for pain relief is just a temporary measure and not a cure for the problem. \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eDental decay\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e can either be treated by a restorative filling or if it has spread deep into the pulp then a root canal treatment may be advised. Do not delay your visit to the dental surgeon.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eAbscess\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eInfections \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003ein the mouth can be dangerous, especially near the root of a tooth or in the space between teeth and gums. These can spread to nearby teeth and gum tissue, as well as the adjacent body parts, if left untreated.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eAre you unsure whether or not you have an abscess? Look for a\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e painful, pimple-like swollen spot on your gums. \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eTo avoid worsening your oral health problems, contact our dental surgeon right away for emergency treatment. For temporary relief, rinse your mouth with a mild water solution and apply ice to the swollen area.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eCut or Bitten Tongue, Lip, or Cheek\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eA minor cut can be controlled by applying pressure on the affected area along with\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e ice application. \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eDo remember that the cut will be sensitive to \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ehot and spicy foods\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e so avoid the same for a day or two\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eCall a doctor or go to the hospital emergency room if bleeding cannot be controlled by simple pressure.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eChipped or broken teeth\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eTripping and falling\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e are common causes of a chipped tooth. Biting a little too hard on something is the second most common reason for the same. It not only ruins your perfect smile; but also causes pain.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eA broken tooth with no pain and bleeding:\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e Restorative treatment\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e to reshape the tooth with tooth-colored filling materials is the treatment of choice. We do want to see that wonderful smile of yours.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eA broken tooth with bleeding: Rinse your mouth with warm water and place a piece of gauze over the bleeding area. Apply an \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eice pack to reduce swelling \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eand visit your nearest doctor as earliest as possible that proper treatment protocol can be followed to prevent discoloration of the tooth along with complete aesthetic restoration.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eSports activities are commonly associated with tooth chipping and it's important that you wear\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e protective mouthguards \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eto save your teeth. These can be fabricated as per your needs by the dental surgeon.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eKnocked Out Permanent Tooth\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eWe surely are not going to grow a new tooth but then what must be done next? Can this tooth be replaced?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eThe answer to it depends completely on the severity of the injury and the condition of the tooth.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"background-color: transparent;\"\u003e\u003cem\u003eWhat if I could not immediately restore it?\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eTransport the tooth in a cup filled with the\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e patient's saliva or milk, not water. \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eThis will help preserve the tooth in time for emergency restoration at our dental clinic.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eThe patient needs to see a dentist right away! In order to save the tooth, you must act quickly.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cstrong style=\"background-color: transparent;\"\u003e\u003cem\u003eWhat if I can't find it?\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eThe best thing now is to look for alternative treatments such as \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003eimplants \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eto restore that perfect smile of yours and we shall be happy to help you.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eKnocked-Out Baby Tooth\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eMake an appointment with your child's dentist. The baby tooth should not be \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ereplanted\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e, unlike a permanent tooth, because it may cause damage to the developing permanent tooth. In the vast majority of cases, no treatment is required.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eLost filling or crown\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eCrowns and fillings\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e are used to restore the appearance and function of teeth that have been previously damaged. As a result, if this break, you must get them treated by a specialist immediately to prevent further damage or reinfection.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong style=\"background-color: transparent;\"\u003eBroken orthodontics\u003c/strong\u003e\u003c/h2\u003e\u003cp\u003e\u003cem style=\"background-color: transparent;\"\u003eBraces \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eare strong— the\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e metal wires and brackets\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e are made to withstand chewing, eating, and even talking on a daily basis. Even so, they can break or detach, poking your cheeks and gums. This not only causes discomfort, but it can also stifle or even interfere with the ongoing orthodontic treatment.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eIf this happens, use an\u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003e orthodontic wax,\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ea small cotton ball, or a piece of gauze \u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003eto cover the exposed end to avoid impingement and visit your orthodontist as soon as possible for necessary treatment. \u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cbr\u003e\u003c/h2\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T13:01:03.913Z","updatedAt":"2024-11-21T07:24:04.913Z","publishedAt":"2022-04-20T06:04:08.877Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cove Z","updatedAt":"2023-02-28T11:43:51.747Z","publishedAt":"2023-02-28T11:43:51.744Z","name":"drnitinkumarmoral"}],"seo_information":{"id":39,"title":"Common Dental problems: Lets not ignore","description":null,"keywords":"Dental problem, tooth problem"},"faq":[],"negated_specialities":[],"speciality_groups":[{"id":7,"speciality_group_id":"a2c873a0-9042-4ddc-bdd3-69a61a254936","speciality_group_name":"Dentistry","createdAt":"2022-04-05T15:16:10.437Z","updatedAt":"2022-04-05T15:16:10.437Z","publishedAt":"2022-04-05T15:16:10.435Z"}],"executive_tags":[{"id":1,"tag_name":"Free","createdAt":"2022-10-14T07:21:49.257Z","updatedAt":"2022-10-14T07:21:50.115Z","publishedAt":"2022-10-14T07:21:50.110Z"}],"doctors":[],"tags":[{"id":1,"tag":"gum pain","createdAt":"2022-04-06T03:53:14.931Z","updatedAt":"2022-04-20T06:06:41.816Z","publishedAt":"2022-04-20T06:06:41.807Z"},{"id":3,"tag":"bleeding gums","createdAt":"2022-04-06T03:55:11.182Z","updatedAt":"2022-04-20T05:48:23.241Z","publishedAt":"2022-04-20T05:48:23.232Z"},{"id":454,"tag":"Side effects of root canal procedure","createdAt":"2022-04-08T14:59:13.085Z","updatedAt":"2022-04-08T14:59:13.085Z","publishedAt":"2022-04-08T14:59:13.084Z"}],"createdBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"},"updatedBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"}}}],"meta":{"pagination":{"page":1,"pageCount":1,"pageSize":3,"total":"3"}}},"dataUpdateCount":1,"dataUpdatedAt":1781563010649,"error":null,"errorUpdateCount":0,"errorUpdatedAt":0,"fetchFailureCount":0,"fetchMeta":null,"isFetching":false,"isInvalidated":false,"isPaused":false,"status":"success"},"queryKey":["healthblogs",false,1],"queryHash":"[\"healthblogs\",false,1]"},{"state":{"data":{"data":[{"id":2,"attributes":{"id":2,"title":"Dental Fillings","name":"dental-fillings-1","article_type":"treatment","summary":"Repairing the decay with fillings that blend in.\n\n","body":"\u003cp\u003e\u003cimg src=\"https://d3t5ai5vcxyqte.cloudfront.net/media/wkwxitlm.jpg\" alt=\"Dental-fillings.jpg\"\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eA \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003edental restoration\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e, also known as a \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003edental filling\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e, is a procedure that restores the function, shape, and structure of a decayed tooth structure\u003c/span\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e\u003cem\u003e \u003c/em\u003e\u003c/strong\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003ewhich could be a result of caries or trauma.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eTooth-colored restorations also called composite restoration binds chemically to the tooth surface thus replicating the normal tooth color, form, and function.\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e These \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003efillings\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e have a strength similar to a healthy tooth with no cavities.\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eThere are a variety of dental filling materials available out of which \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eGold, silver, amalgam are discontinued due to various reasons.\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e The tooth-colored restorations such as \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003ecomposites, and glass ionomers filling material \u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eare widely used options for filling teeth nowadays.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eDo remember that we can help you determine the best type of filling material as per the location and extent of the decay and your oral hygiene conditions.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eCONTACT US TO KNOW MORE !!!\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T03:59:09.252Z","updatedAt":"2026-01-31T17:06:09.792Z","publishedAt":"2022-04-20T06:03:57.738Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":3960,"name":"Dental Fillings.svg","alternativeText":"Dental Fillings.svg","caption":"Dental Fillings.svg","width":250,"height":250,"formats":null,"hash":"Dental_Fillings_699efbbcea","ext":".svg","mime":"image/svg+xml","size":5.44,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/twzwqrrllonb.svg","previewUrl":null,"provider":"remedo-upload","provider_metadata":null,"createdAt":"2022-12-19T06:02:34.693Z","updatedAt":"2022-12-19T06:02:34.693Z","folderPath":"/"},"negated_doctors":[{"id":1096,"doctor_id":"18f8e456-c268-4b8b-9f5d-f5d5de6215ea","createdAt":"2023-07-04T08:51:57.423Z","updatedAt":"2023-08-24T08:26:49.412Z","publishedAt":"2023-07-04T08:51:57.413Z","name":"drnehamistry"},{"id":1449,"doctor_id":"dd2265f2-3f56-4f21-9a65-074844d405ae","createdAt":"2024-01-31T07:30:42.843Z","updatedAt":"2024-01-31T11:03:46.475Z","publishedAt":"2024-01-31T07:30:45.959Z","name":"dranuradharani"},{"id":654,"doctor_id":"09680f83-d332-455e-ba9d-a6b0192d50b6","createdAt":"2023-02-28T11:43:49.911Z","updatedAt":"2023-02-28T11:43:51.747Z","publishedAt":"2023-02-28T11:43:51.744Z","name":"drnitinkumarmoral"},{"id":987,"doctor_id":"0bcdb633-82d0-4f07-8072-9f2e176382c3","createdAt":"2023-05-27T13:35:43.872Z","updatedAt":"2023-06-20T12:06:13.769Z","publishedAt":"2023-05-27T13:35:43.864Z","name":"Dr. Atul Parashar"}],"seo_information":{"id":2,"title":"Understanding Dental Restoration: Types of Filling Materials and Their Benefits, dental  fillings, tooth colored","description":"Dental restoration is a procedure that restores the function, shape, and structure of a decayed tooth. Learn about the different types of filling materials and their benefits to help determine the best option for your oral health needs.","keywords":"fillings,restorative treatment, restoration,composite"},"faq":[],"negated_specialities":[],"speciality_groups":[{"id":7,"speciality_group_id":"a2c873a0-9042-4ddc-bdd3-69a61a254936","speciality_group_name":"Dentistry","createdAt":"2022-04-05T15:16:10.437Z","updatedAt":"2022-04-05T15:16:10.437Z","publishedAt":"2022-04-05T15:16:10.435Z"}],"executive_tags":[{"id":1,"tag_name":"Free","createdAt":"2022-10-14T07:21:49.257Z","updatedAt":"2022-10-14T07:21:50.115Z","publishedAt":"2022-10-14T07:21:50.110Z"}],"doctors":[{"id":1096,"doctor_id":"18f8e456-c268- me":"Shweta","lastname":"Tele","username":null,"email":"drshwetaremedo23@gmail.com","password":"$2a$10$sQHKoH2L01SSn9fPALpAxutQHH0nakwOR11LOwN8k577DV8kBWYd2","resetPasswordToken":null,"registrationToken":"b9f3749e3ef51c9edbde52315959199f35e4da10","isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2024-02-06T13:07:03.949Z","updatedAt":"2025-07-14T13:26:00.805Z"}}},{"id":33,"attributes":{"id":33,"title":"Orthodontic Treatment/Braces","name":"orthodontic-treatment-braces-1","article_type":"treatment","summary":"Never be too shy to smile\n","body":"\u003cp\u003e\u003cimg src=\"https://d3t5ai5vcxyqte.cloudfront.net/media/dobeyohe.jpg\" alt=\"Orthodontic.Braces.jpg\"\u003e\u003c/p\u003e\u003cp\u003eDental negligence during teenage years often leads to the presence of misaligned teeth which is not pleasing once an individual begins his adult college or professional life. These misaligned patterns of teeth often include crowding, \u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003ecrooked teeth, and spacing \u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003ebetween teeth along with functional discrepancies which could be a reason to not smile often and might lead to anxiety or self-confidence issues. The position of teeth may have an impact on the shape of the face and its appearance therefore getting it corrected can help boost your confidence and aid in normal function as well.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eOrthodontic treatment\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e helps in aligning the teeth in a proper position which not only has cosmetic aspects but also helps in improving the function of teeth. This treatment is practiced by a specialist called an orthodontist. \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eMalaligned teeth\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e can be a result of\u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e many habits acquired during childhood like nail/lip biting, tongue thrusting, or other factors like \u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003efinger sucking,\u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e small jaw size, or trauma\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eSome people may benefit from newer mini-braces, which are much smaller than traditional braces as the latter poses a means of unpleasant appearance. \u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eRemovable plastic retainers\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e are another option for teeth straightening. If your teeth aren't too crowded, this may also work.\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eWe will guide you about the different types of braces and help you decide which one is best for you.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eBOOK YOUR APPOINTMENT NOW!!!\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T12:40:24.646Z","updatedAt":"2026-01-31T17:07:06.219Z","publishedAt":"2022-12-15T10:33:18.148Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":4037,"name":"Braces.svg","alternativeText":"Braces.svg","caption":"Braces.svg","width":250,"height":250,"formats ful","createdAt":"2022-04-08T14:59:16.688Z","updatedAt":"2022-04-08T14:59:16.688Z","publishedAt":"2022-04-08T14:59:16.687Z"},{"id":515,"tag":"How long do I need to wear braces","createdAt":"2022-04-08T14:59:16.753Z","updatedAt":"2022-04-08T14:59:16.753Z","publishedAt":"2022-04-08T14:59:16.752Z"}],"createdBy":{"id":3,"firstname":"Swati","lastname":"","username":null,"email":"swati.remedo@gmail.com","password":"$2a$10$fK1f63QYv0MpEGp8emwOOOZmc5FbyVzHfkn6dGoQFhzZRDfobd20m","resetPasswordToken":null,"registrationToken":null,"isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2022-04-05T11:56:17.839Z","updatedAt":"2022-04-06T08:39:07.457Z"},"updatedBy":{"id":64,"firstname":"Shweta","lastname":"Tele","username":null,"email":"drshwetaremedo23@gmail.com","password":"$2a$10$sQHKoH2L01SSn9fPALpAxutQHH0nakwOR11LOwN8k577DV8kBWYd2","resetPasswordToken":null,"registrationToken":"b9f3749e3ef51c9edbde52315959199f35e4da10","isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2024-02-06T13:07:03.949Z","updatedAt":"2025-07-14T13:26:00.805Z"}}},{"id":34,"attributes":{"id":34,"title":"Root Canal Treatment","name":"root-canal-treatment-1","article_type":"treatment","summary":"Let's save the tooth\n\n","body":"\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cimg src=\"https://d3t5ai5vcxyqte.cloudfront.net/media/ehmayhoeryecbjzbmncxlan.jpg\" alt=\"Root-Canal-Treatment.jpg\"\u003e\u003c/p\u003e\u003cp\u003eThe most common reason for an individual to visit a dental surgeon is pain. Pain can be caused by various reasons of which dental caries is the most common reason. Usually, caries that are not too deep but cause sensitivity is dealt with by dental fillings. But what if it has gone too deep to be sealed by just filling?? We have a solution for this.\u003c/p\u003e\u003cp\u003e\u003cem style=\"color: rgb(35, 31, 32);\"\u003eRoot canal treatment \u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32);\"\u003ehelps eliminate bacteria from the infected root canal and prevents reinfection of the tooth and helps save the natural tooth. The procedure requires the removal of the decayed and infected part followed by cleaning and filling of the canal with proper medications and finally sealing it off followed by crown placement.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eWe provide treatment options that help\u003c/span\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e improve your smile and tooth function.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eCONTACT US FOR MORE DETAILS.\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T12:43:07.352Z","updatedAt":"2026-01-31T17:08:18.775Z","publishedAt":"2022-04-19T10:50:31.563Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":3969,"name":"Root Canal Treatment.svg","alternativeText":"Root Canal Treatment.svg","caption":"Root Canal Treatment.svg","width":250,"height":250,"formats":null,"hash":"Root_Canal_Treatment_56a0d8e224","ext":".svg","mime":"image/svg+xml","size":18.92,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/epmszgj.svg","previewUrl":null,"provider":"remedo-upload","provider_metadata":null,"createdAt":"2022-12-19T06:53:11.495Z","updatedAt":"2022-12-19T06:53:11.495Z","folderPath":"/"},"negated_doctors":[{"id":1096,"doctor_id":"18f8e456-c268-4b8b-9f5d-f5d5de6215ea","createdAt":"2023-07-04T08:51:57.423Z","updatedAt":"2023-08-24T08:26:49.412Z","publishedAt":"2023-07-04T08:51:57.413Z","name":"drnehamistry"},{"id":654,"doctor_id":"09680f83-d332-455e-ba9d-a6b0192d50b6","createdAt":"2023-02-28T11:43:49.911Z","updatedAt":"2023-02-28T11:43:51.747Z","publishedAt":"2023-02-28T11:43:51.744Z","name":"drnitinkumarmoral"},{"id":987,"doctor_id":"0bcdb633-82d0-4f07-8072-9f2e176382c3","createdAt":"2023-05 s, resulting in brighter teeth. There are two types of stains - extrinsic and intrinsic.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eExtrinsic stains as a result of coffee drinking, smoking, or certain other foodstuffs respond better to teeth whitening as compared to intrinsic stains as a result of fluoride, tetracycline, or even pulpal damage which might require extended sitting to achieve desired results.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eIn-office option: Application of a gel and the use of light to speed up and enhance the bleaching process.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eTooth sensitivity and gingival inflammation can be potential side effects of tooth whitening. Always note to choose your shade wisely and lot go after traditional pearl white tooth so as to offer a naturally healthy and beautiful smile. \u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eYour doctor will always be happy to guide you through your shade selection process.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent;\"\u003eBOOK YOUR APPOINTMENT TO GET THE BEST TREATMENT !!!\u003c/span\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T12:45:52.996Z","updatedAt":"2026-01-31T17:08:52.071Z","publishedAt":"2022-04-20T06:05:20.910Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":4035,"name":"Teethw whitening.svg","alternativeText":"Teethw whitening.svg","caption":"Teethw whitening.svg","width":250,"height":250,"formats":null,"hash":"Teethw_whitening_8f6e0e1051","ext":".svg","mime":"image/svg+xml","size":4.65,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/ojveuau.svg","previewUrl":null,"provider":"remedo-up 5, 31, 32); background-color: transparent;\"\u003esingle missing tooth as an implant-supported bridge and a full mouth implant-supported overdenture.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eImplant-supported crowns and dentures\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e have the advantage of not shifting or slipping while eating or speaking. They are more natural and comfortable, and they also prevent natural bone loss.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eThe quality and quantity of bone available determine their success. Also, the final restoration that is placed on top of the implant has a significant impact.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eREACH OUT TO US FOR FURTHER QUERIES !!!\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T12:48:49.466Z","updatedAt":"2026-01-31T17:09:47.398Z","publishedAt":"2022-10-10T11:12:16.576Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":4036,"name":"Implant.svg","alternativeText":"Implant.svg","caption":"Implant.svg","width":250,"height":250,"formats":null,"hash":"Implant_e5943ea9e4","ext":".svg","mime":"image/svg+xml","size":4.65,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/dgodremltbgmv.svg","previewUrl":null,"provider":"remedo-upload","provider_metadata":null,"createdAt":"2022-12-21T09:40:23.670Z","updatedAt":"2022-12-21T09:40:23.670Z","folderPath":"/"},"negated_doctors":[{"id":1096,"doctor_id":"18f8e456-c268-4b8b-9f5d-f5d5de6215ea","createdAt":"2023-07-04T08:51:57.423Z","updatedAt":"2023-08-24T08:26:49.412Z","publishedAt":"2023-07-04T08:51:57.413Z","name":"drnehamistry"},{"id":3,"doctor_id": mail.com","password":"$2a$10$sQHKoH2L01SSn9fPALpAxutQHH0nakwOR11LOwN8k577DV8kBWYd2","resetPasswordToken":null,"registrationToken":"b9f3749e3ef51c9edbde52315959199f35e4da10","isActive":true,"blocked":false,"preferedLanguage":null,"createdAt":"2024-02-06T13:07:03.949Z","updatedAt":"2025-07-14T13:26:00.805Z"}}},{"id":37,"attributes":{"id":37,"title":"Pediatric Dentistry","name":"pediatric-dentistry-1","article_type":"treatment","summary":"For your child’s dental health\n\n","body":"\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cimg src=\"https://d3t5ai5vcxyqte.cloudfront.net/media/tfrzinry.jpg\" alt=\"Paediatric-Dentistry.jpg\"\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eHealthy habits last a lifetime and without proper dental care and knowledge, children are at risk of developing tooth decay, which can lead to a lifetime of pain and fear. Therefore imparting the knowledge early can keep the complications at bay.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003ePediatric Dentistry \u003c/em\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003elays its emphasis on :\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cem style=\"background-color: transparent;\"\u003eEducating and counseling\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e the parents so that oral health care and examinations can begin from an early age and reduce the risk of developing dental decay.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eImportant preventive measures such as proper nutrition and diet recommendation along with \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003efluoride and sealant treatments\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e can help safeguard a child's teeth.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eA continuous evaluation can help assess and evaluate the dental health as the child grows so that major dental issues and problems can be treated early such as counseling for habits such as \u003c/span\u003e\u003cem style=\"background-color: transparent;\"\u003ethumb sucking, and finger chewing\u003c/em\u003e\u003cspan style=\"background-color: transparent;\"\u003e which can result in the alignment of the teeth.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eCONTACT US TO KNOW MORE !!!\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-06T12:51:14.406Z","updatedAt":"2026-01-31T17:13:51.722Z","publishedAt":"2022-04-19T10:49:19.604Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":3970,"name":"Pediatric Dentistry.svg","alternativeText":"Pediatric Dentistry.svg","caption":"Pediatric Dentistry.svg","width":250,"height":250,"formats":null,"hash":"Pediatric_Dentistry_f9ca247e70","ext":".svg","mime":"image/svg+xml","size":18.92,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/qpwwaclfnsyoopkgkkxkutxrzx.svg","previewUrl":null,"provider":"remedo-upload","provider_metadata":null,"createdAt":"2022-12-19T06:54:07.959Z","updatedAt":"2022-12-19T06:54:07.959Z","folderPath":"/"},"negated_doctors":[{"id":1096,"doctor_id":"18f8e456-c268-4b8b-9f5d-f5d5de6215ea","createdAt":"2023-07-04T08:51:57.423Z","updatedAt":"2023-08-24T08:26:49.412Z","publishedAt":"2023-07-04T08:51:57.413Z","name":"drnehamistry"},{"id":279,"doctor_id":"870ed9bf-652f-4848-9603-641e0d0c1fd2","createdAt":"2022-12-15T14:23:52.474Z","updatedAt":"2022-12-21T09:10:19.327Z","publishedAt":"2022-12-15T14:23:54.536Z","name":"drsugandhaghonasgi"},{"id":654,"doctor_id":"09680f83-d332-455e-ba9d-a6b0192d5 res-1","article_type":"treatment","summary":"Know the right type of denture for you.\n\n","body":"\u003cp\u003e\u003cimg src=\"https://d3t5ai5vcxyqte.cloudfront.net/media/blnccebowefc.jpg\" alt=\"Dentures.jpg\"\u003e\u003c/p\u003e\u003cp\u003e\u003cem style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eDentures \u003c/em\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eare a popular tooth replacement option that is also one of the oldest treatment methods. Dentures aid in food chewing, speech, and a person's aesthetic appeal.\u003c/span\u003e\u003cem style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003e \u003c/em\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eDepending on the number of teeth that need to be replaced, removable partial or complete dentures can be made.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003ePartial Dentures: \u003c/strong\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eWhen one or more natural teeth remain in the upper or lower jaw. \u003c/span\u003e\u003cstrong style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eComplete Dentures:\u003c/strong\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003e When all of the teeth in a jaw have been lost and need to be replaced prosthetically\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eDo not make the decision on your own: the type of dentures you require is primarily dependent on the condition of your present teeth, jaws, gum health, and overall oral hygiene and maintenance.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"background-color: transparent; color: rgb(35, 31, 32);\"\u003eCONTACT US T an\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eStained teeth\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eGummy smiles\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eFractured teeth\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003ePigmentation on gums\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"background-color: transparent;\"\u003eOld silver fillings\u003c/span\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cem style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eCosmetic treatments\u003c/em\u003e\u003cspan style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003e like cosmetic fillings, porcelain veneers, teeth whitening, crown and bridge, full mouth rehabilitation, smile correction, and teeth restoration are provided at our clinic.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"color: rgb(35, 31, 32); background-color: transparent;\"\u003eCONTACT US TO GET THE BEST SERVICE !!!\u003c/strong\u003e\u003c/p\u003e","video_link":null,"video_length":null,"createdAt":"2022-04-09T07:16:25.162Z","updatedAt":"2026-01-31T17:11:17.889Z","publishedAt":"2022-04-19T10:01:55.663Z","button_text":null,"button_url":null,"start_date":null,"end_date":null,"cover":{"id":74,"name":"Cosmetic surgery.svg","alternativeText":"Cosmetic surgery.svg","caption":"Cosmetic surgery.svg","width":null,"height":null,"formats":null,"hash":"Cosmetic_surgery_5a89b73c71","ext":".svg","mime":"image/svg+xml","size":127.21,"url":"https://d3t5ai5vcxyqte.cloudfront.net/media/trteeoeviitzkuduaj.svg","previewUrl":null,"provider":null,"provider_metadata":null,"createdAt":"2022-04-09T06:18:00.044Z","updatedAt":"2022-04-09T07:31:12.787Z","folderPath":null},"negated_doctors":[{"id":1096,"doctor_ c-rp-mo-br100"}},{"starRatingNumber":5,"updateTime":"2026-01-12T06:51:26.613871Z","comment":"I can confidently say that Pinnacle Dental Care, Kharghar (Navi Mumbai) gave me the best dental experience of my life, and all the credit goes to Dr. Anand Kulkarni.\nBefore starting my treatment, I was extremely scared about tooth extraction after hearing so many frightening stories from friends. I had upper and lower teeth extractions on both sides—first on the right side, followed by a two-month healing period, and then the left side. For someone like me who panics even over small things, this sounded terrifying.\nBut from day one, Dr. Anand Kulkarni completely changed my perception of dental treatment. He handled everything with such calmness, patience, and expertise that the entire process turned out to be surprisingly painless and completely stress-free. He explained each step, reassured me constantly, and made sure I was comfortable throughout.\nWhat truly sets him apart is not just his skill as a dental surgeon, but his genuine care for his patients. Even during the recovery phase, whenever I panicked or called him for the smallest concerns, he was always available, always patient, and always reassuring. Knowing that the doctor was just a call away made a world of difference.\nDr. Anand Kulkarni is not only an excellent dental surgeon but also a wonderful human being who truly understands the pulse of his patients and treats them with empathy and compassion. He made me feel so comfortable that the entire procedure felt completely fearless, something I never thought was possible for me.\nIf you’re someone who is anxious, scared, or hesitant about dental procedures, I can’t recommend Pinnacle Dental Care and Dr. Anand Kulkarni enough. Hands down, one of the best doctors and dental surgeons I have ever come across. 🙏\nHighly recommended! 🌟","reviewer":{"displayName":"Shobha Mednikar","profilePhotoUrl":"https://lh3.googleusercontent.com/a-/ALV-UjUH7Yg7Oe5IDIb1kQ9q2fAQpJV
