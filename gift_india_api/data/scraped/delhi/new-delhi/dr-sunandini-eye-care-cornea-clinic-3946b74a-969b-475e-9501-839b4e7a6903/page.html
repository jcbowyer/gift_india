rgency services around the clock.\"}},{\"@type\":\"Question\",\"name\":\"Are the hospitals accredited?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes. Bhagat Hospital in Janak Puri received ISO 9001:2008 certification in 2005. Bhagat Chandra Hospital earned NABH accreditation in 2014. The Janak Puri branch is also undergoing NABH certification.\"}},{\"@type\":\"Question\",\"name\":\"When and where were Bhagat Hospital and Bhagat Chandra Hospital established?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Bhagat Hospital was founded in 1993 in Janak Puri as a 20-bed multi-specialty nursing home. In 2009, the team expanded and opened an 85-bed facility—Bhagat Chandra Hospital—near the Dwarka (Palam Flyover) area.\"}}]}}"}])</script><script src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js" noModule=""></script></head><body style="height:100%" class="__variable_98cf97"><script src="/_next/static/chunks/webpack-9d84a01bafcf113f.js" async=""></script><script>(self.__next_f=self.__next_f||[]).push([0]);self.__next_f.push([2,null])</script><script>self.__next_f.push([1,"0:\"$L1\"\n"])</script><script>self.__next_f.push([1,"2:HL[\"/_next/static/media/e4af272ccee01ff0-s.p.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n3:HL[\"/_next/static/css/ee7246ff26192798.css\",\"style\"]\n4:HL[\"/_next/static/css/c57d25e02ff5f2ff.css\",\"style\"]\n5:HL[\"/_next/static/css/f08150324baca4d3.css\",\"style\"]\n"])</script><script>self.__next_f.push([1,"6:I[47690,[],\"\"]\na:I[5613,[],\"\"]\nb:I[31778,[],\"\"]\nd:I[48955,[],\"\"]\ne:[]\n"])</script><script>self.__next_f.push([1,"1:[null,[\"$\",\"$L6\",null,{\"buildId\":\"7Ws-vq2tibeQrar62_h7v\",\"assetPrefix\":\"\",\"initialCanonicalUrl\":\"/\",\"initialTree\":[\"\",{\"children\":[\"hospitalchaintemplate3\",{\"children\":[\"__PAGE__\",{}]},\"$undefined\",\"$undefined\",true]}],\"initialSeedData\":[\"\",{\"children\":[\"hospitalchaintemplate3\",{\"children\":[\"__PAGE__\",{},[\"$L7\",\"$L8\",null]]}, \r\\n\\r\\nAlternatively, walk-ins are accepted any time since the hospitals operate 24/7.\"}},{\"@type\":\"Question\",\"name\":\"What departments and specialties are offered?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Bhagat Hospital and Bhagat Chandra Hospital are full-service, multi-specialty facilities. Key departments include Obstetrics \u0026 Gynaecology (with IVF \u0026 pain-free delivery), NICU, Orthopaedics, Ophthalmology, Dental, Infertility (Bavishi Bhagat Fertility Institute), Plastic Surgery, Cardiology, Neurology, and more. Over 100 babies are delivered monthly, with both routine and high-risk obstetric care.\"}},{\"@type\":\"Question\",\"name\":\"What room types are available and what are the charges?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Room options and per-day costs (in INR) are: General Ward (₹2,400), A/C General Ward (₹3,600), Sharing Room (₹4,400), Private Room (₹5,600), Deluxe Room (₹7,700), HDU  (₹4,500), ICU (₹6,400), Day Care (₹1,500)\\r\\n\\r\\nThese rates cover routine nursing and diet; additional services like procedures, medicines, diagnostics, and consultant visits incur extra charges.\"}},{\"@type\":\"Question\",\"name\":\"What are your visiting and emergency hours?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Both hospitals operate 24 hours a day, all year round, including emergency services around the clock.\"}},{\"@type\":\"Question\",\"name\":\"Are the hospitals accredited?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes. Bhagat Hospital in Janak Puri received ISO 9001:2008 certification in 2005. Bhagat Chandra Hospital earned NABH accreditation in 2014. The Janak Puri branch is also undergoing NABH certification.\"}},{\"@type\":\"Question\",\"name\":\"When and where were Bhagat Hospital and Bhagat Chandra Hospital established?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Bhagat Hospital was founded in 1993 in Janak Puri as a 20-bed multi-specialty nursing home. In 2009, the team expanded and opened an 85-bed facility—Bhagat Chandra Hospital—near the Dwarka (Palam Flyover) area.\"}}]}}"])</script><script>self.__next_f.push([1,"1e:[\"$\",\"$L25\",null,{\"strategy\":\"beforeInteractive\",\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$26\"}}]\n"])</script><script>self.__next_f.push([1,""])</script></body></html>
