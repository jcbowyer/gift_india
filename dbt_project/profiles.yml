# Local dbt profile for the gift_india Databricks (upstream) medallion project.
# Matches `profile: gift_india_databricks` in dbt_project.yml.
#
# Authentication uses Databricks unified auth (the CLI config in
# ~/.databrickscfg). Select the workspace profile with an env var, e.g.
#
#   DATABRICKS_CONFIG_PROFILE=gift-india dbt build
#
# When this project runs as a Databricks Jobs dbt task, the platform injects
# its own generated profiles.yml from the task's warehouse_id/catalog/schema,
# so this file is only used for local development.
gift_india_databricks:
  target: dev
  outputs:
    dev:
      type: databricks
      host: dbc-0951416d-6d0e.cloud.databricks.com
      http_path: /sql/1.0/warehouses/234ccf680e359443
      auth_type: oauth
      catalog: "{{ env_var('GIFT_INDIA_CATALOG', 'gift_india') }}"
      schema: gift_india
      threads: 4
