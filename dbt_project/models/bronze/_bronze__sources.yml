version: 2

sources:
  - name: virtue_foundation
    description: >-
      Governed Virtue Foundation dataset, shared into this workspace via Delta
      Sharing. Read-only upstream — bronze lands it verbatim.
    catalog: databricks_virtue_foundation_dataset_dais_2026
    schema: virtue_foundation_dataset
    tables:
      - name: facilities
        description: >-
          Geotagged healthcare facility records. Capability columns
          (specialties, procedure, equipment, capability) are JSON-array
          strings extracted upstream from facility web content.
          `specialties` holds clean camelCase codes; the others hold free text.
        columns:
          - name: unique_id
            description: Entity-resolved facility primary key.
            data_tests:
              - not_null
      - name: nfhs_5_district_health_indicators
        description: NFHS-5 district-level health indicators (wide format).
      - name: india_post_pincode_directory
        description: India Post pincode reference directory (geocoding / attribution).
