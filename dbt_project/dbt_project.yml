# Databricks (upstream) medallion. Distinct from the Postgres serving project
# in ../gift_india_dbt (adapter: postgres) — these are two separate dbt projects
# in the pipeline, not duplicates. See ../README.md for the architecture.
name: gift_india_databricks
version: "1.0.0"
config-version: 2

# Connection profile. Locally this resolves from profiles.yml in this directory
# (Databricks unified auth via the `gift-india` CLI profile). When run as a
# Databricks Jobs dbt task, the platform generates a matching `gift_india_databricks`
# profile from the task's warehouse_id / catalog / schema.
profile: gift_india_databricks

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Medallion architecture — one schema per layer under the configured catalog.
# generate_schema_name (macros/) returns these verbatim (no target-schema prefix),
# so models land in <catalog>.bronze_gift_india / silver_gift_india / gold_gift_india.
# Only the gold layer is synced out to Lakebase (Delta is the source of truth);
# bronze and silver live in the lakehouse only.
models:
  gift_india_databricks:
    +persist_docs:
      relation: true
      columns: true
    bronze:
      +schema: bronze_gift_india
      +materialized: table
    silver:
      +schema: silver_gift_india
      +materialized: table
    gold:
      +schema: gold_gift_india
      +materialized: table

# Reference data (friendly metric labels + categories) lands alongside silver.
seeds:
  gift_india_databricks:
    +schema: silver_gift_india
    metric_definitions:
      +column_types:
        metric_name: string
        metric_label: string
        metric_category: string
